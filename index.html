
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/img/shifocrm_logo.png">
    <title>ShifoCRM — Klinikalar uchun CRM tizimi</title>
    <meta name="description" content="ShifoCRM bilan qabul, bemorlar, to‘lovlar, ombor va hisobotlarni bitta platformada boshqaring. Demo so‘rang.">
    <meta name="keywords" content="klinika crm, stomatologiya crm, qabul tizimi, bemor boshqaruvi, tibbiy crm">
    <meta property="og:title" content="ShifoCRM — Klinikangiz boshqaruvi bitta tizimda">
    <meta property="og:description" content="Qabul, bemor, moliya va ombor jarayonlarini avtomatlashtiring.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/img/shifocrm_logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              shifo: {
                primary: '#0090C5',
                secondary: '#00B4D8',
                accent: '#0077B6',
                light: '#F0F9FF',
                dark: '#023E8A',
                border: '#E2E8F0',
                sidebar: '#FFFFFF'
              }
            },
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'sans-serif'],
              display: ['Space Grotesk', 'Plus Jakarta Sans', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'slide-up': 'slideUp 0.6s ease-out',
              'float': 'float 3s ease-in-out infinite',
              'pulse-soft': 'pulseSoft 3s ease-in-out infinite',
              'float-slow': 'floatSlow 7s ease-in-out infinite',
              'shimmer': 'shimmer 2.2s ease-in-out infinite',
              'marquee': 'marquee 18s linear infinite',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideUp: { '0%': { transform: 'translateY(30px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
              float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-15px)' } },
              pulseSoft: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0.7' } },
              floatSlow: { '0%, 100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-20px)' } },
              shimmer: { '0%': { transform: 'translateX(-60%)' }, '100%': { transform: 'translateX(120%)' } },
              marquee: { '0%': { transform: 'translateX(0)' }, '100%': { transform: 'translateX(-50%)' } }
            }
          }
        }
      }
    </script>
    <style>
        body { 
          font-family: 'Plus Jakarta Sans', sans-serif; 
          scroll-behavior: smooth;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .shifo-gradient {
            background: linear-gradient(135deg, #0090C5 0%, #00B4D8 100%);
        }
        .sidebar-active {
            background: #0090C5;
            color: white !important;
            box-shadow: 0 10px 25px -5px rgba(0, 144, 197, 0.4);
        }
        .custom-scrollbar::-webkit-scrollbar {
          width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
          background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
          background: #e2e8f0;
          border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
          background: #cbd5e1;
        }
        @media (prefers-reduced-motion: reduce) {
          *, *::before, *::after {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
            transition-duration: 0.01ms !important;
            scroll-behavior: auto !important;
          }
        }
    </style>
